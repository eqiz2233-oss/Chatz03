<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatz — Unified Chat • AI Sales • Slip Verify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Sarabun: Thai-first typeface with full Latin coverage.
      Replaces Inter + Noto Sans Thai (two fonts, mismatched metrics).
      Sarabun's Thai glyphs are designed for the same optical size as its
      Latin, so Thai/Latin mixed text looks unified, not patched together.
      Weight map: 400 body · 500 medium · 600 semibold · 700 bold · 800 headings
    -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

    <!--
      OAuth providers. Both scripts are tiny and only do work when their
      respective JS APIs are actually called from the Login screen, so it's
      safe to load them on every page.
        - Google Identity Services: `google.accounts.id.*`
        - Facebook JS SDK: `FB.login`, etc.
    -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script async defer src="https://connect.facebook.net/en_US/sdk.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
